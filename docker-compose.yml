services:
  github-org-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-org-manager
    ports:
      - "6010:3000"
    env_file:
      - .env.local
    environment:
      # Ensure these are passed from .env.local
      - DATABASE_URL=postgresql://lclpostgresusr:lclpostgrespasswd@github_manager_db:5432/github_manager
      - APP_URL=http://localhost:6010/github
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/github || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: github_manager_db
    environment:
      POSTGRES_USER: lclpostgresusr
      POSTGRES_PASSWORD: lclpostgrespasswd
      POSTGRES_DB: github_manager
    ports:
      - "6001:5432"
    volumes:
      - github_manager_postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lclpostgresusr -d github_manager"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

 # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: github_manager_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@githubmanager.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - github_manager_pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    profiles:
      - tools  # Only start with: docker-compose --profile tools up


volumes:
  github_manager_postgres_data:
  github_manager_pgadmin_data: